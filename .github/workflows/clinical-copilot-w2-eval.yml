name: Clinical Co-Pilot W2 Eval Gate

on:
  pull_request:
    paths:
      - "clinical-copilot/**"
  push:
    branches: [main, feat/w2-multimodal]
    paths:
      - "clinical-copilot/**"

defaults:
  run:
    working-directory: clinical-copilot

jobs:
  w2-eval-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev]"

      - name: Unit tests (W2, no DB)
        env:
          COPILOT_LLM_PROVIDER: mock
        run: .venv/bin/pytest tests/w2 -q --tb=short -m "not integration"

      - name: 50-case dataset present
        env:
          COPILOT_LLM_PROVIDER: mock
        run: |
          .venv/bin/python -c "from eval_w2.dataset import CASES; assert len(CASES)==50"
          .venv/bin/python -c "from eval_w2.rubrics import RUBRIC_NAMES; assert 'schema_valid' in RUBRIC_NAMES"

      - name: HARD GATE proof (baseline pass + inject must fail)
        env:
          COPILOT_LLM_PROVIDER: mock
          PYTHONPATH: .
        run: .venv/bin/python eval_w2/prove_hard_gate.py
